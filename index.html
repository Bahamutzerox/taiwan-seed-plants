<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>臺灣種子植物名錄 — 分類沙丘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-main">
    <div class="header-title">
      <h1>臺灣種子植物名錄</h1>
      <p class="version">ver1.0 202505 · <span class="exotic-note">* 外來種（持續更新中）</span></p>
    </div>

    <div class="search-controls">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="搜尋中文名或拉丁名…" autocomplete="off">
        <button id="clear-search" class="clear-btn hidden" aria-label="清除搜尋">✕</button>
      </div>
      <div class="filter-group">
        <label class="filter-chip active" id="chip-native">
          <input type="checkbox" id="filter-native" checked> 原生種
        </label>
        <label class="filter-chip active" id="chip-exotic">
          <input type="checkbox" id="filter-exotic" checked> 外來種 *
        </label>
      </div>
    </div>
  </div>

  <div id="stats" class="stats"></div>
</header>

<main>
  <div id="loading" class="loading">載入資料中…</div>
  <div id="checklist"></div>
  <div id="no-results" class="no-results hidden">
    <p>找不到符合「<span id="search-term"></span>」的物種</p>
  </div>
</main>

<footer>
  <p>© 分類沙丘 Taxonomic Dune · <a href="https://taxonomicdune.com">taxonomicdune.com</a></p>
  <p>* 外來種 &nbsp; × 雜交種</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>
</body>
</html>
